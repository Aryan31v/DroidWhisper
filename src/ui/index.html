<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DroidWhisper</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div id="pill" class="pill">
        <div class="status-dot">
            <div class="dot">
                <div class="dot-inner"></div>
            </div>
        </div>
        
        <!-- WAVEFORM (Rhythmic Breathing v18.0) -->
        <div class="waveform">
            <div class="bar"></div>
            <div class="bar"></div>
            <div class="bar"></div>
            <div class="bar"></div>
            <div class="bar"></div>
            <div class="bar"></div>
            <div class="bar"></div>
            <div class="bar"></div>
            <div class="bar"></div>
            <div class="bar"></div>
            <div class="bar"></div>
            <div class="bar"></div>
        </div>
        
        <div class="status-container">
            <div id="status-label" class="status-text">STARTING</div>
        </div>

    </div>

    <script defer src="renderer.js"></script>
</body>

</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DroidWhisper</title>
    <style>
        :root {
            --bg-color: #141419;
            --accent-color: #00f2fe;
            --prompt-color: #a855f7;
            --recording-color: #f5576c;
            --text-color: #ffffff;
            --solid-border: #33333a;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Outfit', 'Inter', system-ui, sans-serif;
            background: transparent; /* Transparent to show the curved pill */
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            -webkit-app-region: drag;
            overflow: hidden;
        }

        .pill {
            width: 320px;
            height: 48px;
            background: var(--bg-color);
            border: 2px solid var(--solid-border); /* Solid border */
            border-radius: 24px;
            display: flex;
            align-items: center;
            padding: 0 16px;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.8);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .mode-toggle {
            cursor: pointer;
            -webkit-app-region: no-drag;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            padding: 4px 10px;
            margin-right: 12px;
            font-size: 10px;
            font-weight: 800;
            letter-spacing: 0.5px;
            color: var(--accent-color);
            border: 1px solid rgba(0, 242, 254, 0.2);
            transition: all 0.2s ease;
            user-select: none;
        }

        .mode-toggle:hover {
            background: rgba(0, 242, 254, 0.1);
            transform: translateY(-1px);
        }

        .mode-toggle.prompt-mode {
            color: var(--prompt-color);
            border-color: rgba(168, 85, 247, 0.3);
        }

        .mode-toggle.prompt-mode:hover {
            background: rgba(168, 85, 247, 0.1);
        }

        .status-dot {
            width: 10px;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 12px;
        }

        .dot {
            width: 10px;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .dot-inner {
            width: 8px;
            height: 8px;
            background: var(--accent-color);
            border-radius: 50%;
            box-shadow: 0 0 10px var(--accent-color);
            transition: all 0.3s ease;
        }

        .pill.recording .dot-inner {
            background: var(--recording-color);
            box-shadow: 0 0 15px var(--recording-color);
            transform: scale(1.5);
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { opacity: 1; transform: scale(1.2); }
            50% { opacity: 0.5; transform: scale(1.5); }
            100% { opacity: 1; transform: scale(1.2); }
        }

        .status-text {
            flex-grow: 1;
            font-size: 0.85rem;
            font-weight: 700;
            letter-spacing: 0.5px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            text-transform: uppercase;
        }

        .hotkey {
            font-size: 0.65rem;
            opacity: 0.6;
            font-weight: 800;
            padding-left: 10px;
            border-left: 2px solid var(--solid-border);
            color: var(--accent-color);
        }

        /* --- WAVEFORM STYLING (NEW v14.0) --- */
        .waveform {
            display: none;
            align-items: center;
            gap: 3px;
            height: 24px;
            margin-right: 12px;
            flex-grow: 1;
            justify-content: center;
            -webkit-app-region: no-drag;
        }

        .pill.recording .waveform {
            display: flex;
        }

        .pill.recording .status-dot,
        .pill.recording .status-text {
            display: none; /* Hide static elements when recording */
        }

        .bar {
            width: 3px;
            background: #e5e7eb;
            border-radius: 4px;
            height: 8px;
            transform-origin: center;
            transition: transform 0.05s ease; /* Ultra-low latency transition */
        }

        .history-btn {
            background: none;
            border: none;
            color: #fbbf24;
            cursor: pointer;
            font-size: 1rem;
            margin-left: 8px;
            padding: 4px;
            opacity: 0.4;
            transition: all 0.3s ease;
            -webkit-app-region: no-drag;
            display: none; /* Hidden until first transcription */
        }

        .history-btn:hover {
            opacity: 1;
            transform: scale(1.2);
        }

        .history-btn.active {
            display: block;
        }
    </style>
</head>
<body>
    <div id="pill" class="pill">
        <div class="mode-toggle" id="mode-toggle" title="Click to switch mode">
            <span id="mode-text">DICT</span>
        </div>
        <div class="status-dot">
            <div class="dot">
                <div class="dot-inner"></div>
            </div>
        </div>
        <!-- WAVEFORM (NEW v14.0) -->
        <div class="waveform">
            <div class="bar"></div>
            <div class="bar"></div>
            <div class="bar"></div>
            <div class="bar"></div>
            <div class="bar"></div>
            <div class="bar"></div>
            <div class="bar"></div>
            <div class="bar"></div>
            <div class="bar"></div>
            <div class="bar"></div>
            <div class="bar"></div>
            <div class="bar"></div>
        </div>
        <div id="status-label" class="status-text">STARTING...</div>
        <div id="history-btn" class="history-btn" title="Re-inject last transcription (Use if first attempt failed)">🕒</div>
        <div id="context-indicator" style="opacity: 0; color: #fbbf24; margin-left: 5px; font-size: 0.9rem; transition: opacity 0.3s ease;" title="Selection captured as context">🔗</div>
    </div>

    <script>
        const { ipcRenderer } = require('electron');
        const statusLabel = document.getElementById('status-label');
        const contextIndicator = document.getElementById('context-indicator');
        const historyBtn = document.getElementById('history-btn');
        const modeText = document.getElementById('mode-text');
        const modeToggle = document.getElementById('mode-toggle');
        const pill = document.getElementById('pill');
        const bars = document.querySelectorAll('.bar');
        
        let currentMode = 'dictation';

        // v16.0: True Phone-Aware Visualizer
        // Reacts to volume levels coming directly from scrcpy stream
        ipcRenderer.on('vocal-level', (event, level) => {
            // Apply level to all bars with slight randomization for organic feel
            bars.forEach((bar, i) => {
                const variance = Math.sin(Date.now() / 100 + i) * 0.2;
                const scale = (level * 3) + 0.5 + variance;
                bar.style.transform = `scaleY(${Math.max(0.5, Math.min(scale, 3.5))})`;
                bar.style.opacity = Math.max(0.4, Math.min(level * 2, 1));
            });
        });

        function resetWaveform() {
            bars.forEach(bar => {
                bar.style.transform = 'scaleY(1)';
                bar.style.opacity = '0.4';
            });
        }

        // Trigger permission probe on startup to get the security pop-up out of the way
        window.addEventListener('load', () => {
            console.log('UI: Booting Up - Triggering Permission Probe...');
            ipcRenderer.send('trigger-permission-probe');
        });

        // Notify main process of initial mode
        ipcRenderer.send('mode-switch', currentMode);

        modeToggle.addEventListener('click', () => {
            currentMode = currentMode === 'dictation' ? 'prompt' : 'dictation';
            modeText.innerText = currentMode === 'dictation' ? 'DICT' : 'PROMPT';
            
            if (currentMode === 'prompt') {
                modeToggle.classList.add('prompt-mode');
            } else {
                modeToggle.classList.remove('prompt-mode');
            }
            
            ipcRenderer.send('mode-switch', currentMode);
        });

        historyBtn.addEventListener('click', () => {
            console.log('UI: User requested transcription retry.');
            ipcRenderer.send('retry-typing');
        });

        ipcRenderer.on('status-change', (event, status) => {
            statusLabel.innerText = status;
            const upperStatus = status.toUpperCase();
            
            if (upperStatus.includes('RECORDING')) {
                const isPrompt = upperStatus.includes('PROMPT');
                pill.classList.add('recording');
                pill.style.borderColor = isPrompt ? 'var(--prompt-color)' : 'var(--accent-color)';
                pill.style.boxShadow = isPrompt 
                    ? '0 0 20px rgba(168, 85, 247, 0.4)' 
                    : '0 0 20px rgba(0, 242, 254, 0.4)';
            } else if (upperStatus.includes('READY')) {
                pill.classList.remove('recording');
                pill.style.borderColor = currentMode === 'prompt' ? 'var(--prompt-color)' : 'var(--accent-color)';
                pill.style.boxShadow = 'none';
                historyBtn.classList.add('active');
                resetWaveform();
            } else if (upperStatus.includes('TYPING')) {
                historyBtn.classList.add('active');
                resetWaveform();
            } else {
                pill.classList.remove('recording');
                pill.style.borderColor = 'var(--solid-border)';
                pill.style.boxShadow = 'none';
                resetWaveform();
            }
        });

        ipcRenderer.on('context-captured', (event, captured) => {
            contextIndicator.style.opacity = captured ? '1' : '0';
        });
    </script>
</body>
</html>
